map ctrl+shift+enter launch --location=vsplit --cwd=current

# move around window with arrow keys
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

# resize window
map shift+ctrl+left resize_window narrower
map shift+ctrl+right resize_window wider
map shift+ctrl+up resize_window taller
map shift+ctrl+down resize_window shorter 3

# Forward shortcuts to Tmux
map ctrl+tab send_text all \x02n
map ctrl+shift+tab send_text all \x02p
map ctrl+shift+t send_text all \x02c
map ctrl+shift+w send_text all \x02&
