map ctrl+shift+enter launch --location=vsplit --cwd=current
map ctrl+shift+t new_tab_with_cwd

# kitty-navigator.nvim mappings (handles Neovim + Kitty navigation)
map ctrl+h kitten pass_keys.py neighboring_window left   ctrl+h
map ctrl+j kitten pass_keys.py neighboring_window bottom ctrl+j
map ctrl+k kitten pass_keys.py neighboring_window top    ctrl+k
map ctrl+l kitten pass_keys.py neighboring_window right  ctrl+l

# move around window with arrow keys
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down


# resize window
map shift+ctrl+left resize_window narrower
map shift+ctrl+right resize_window wider
map shift+ctrl+up resize_window taller
map shift+ctrl+down resize_window shorter 3

# Disable Kitty default tab shortcuts to let Tmux handle them
map ctrl+tab no_op
map ctrl+shift+tab no_op
map ctrl+shift+t no_op
map ctrl+Shift+w no_op
# Send a specific escape sequence for Ctrl+Tab to Tmux
map ctrl+tab send_text all \x1b[1;5I
map ctrl+shift+tab send_text all \x1b[1;6I
# Force send Ctrl+Shift+t to Tmux
map ctrl+shift+t send_text all \x1b[84;5;u
# Map Ctrl+Shift+w to trigger Tmux kill window command (Prefix + &)
# \x02 is Ctrl+b, & is the default tmux kill-window key
map ctrl+shift+w send_text all \x02&
# Map Kitty shortcuts to trigger Tmux native commands
map ctrl+tab send_text all \x02n
map ctrl+shift+tab send_text all \x02p
map ctrl+shift+t send_text all \x02c
