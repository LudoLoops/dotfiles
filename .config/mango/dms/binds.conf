# DMS-specific binds - sourced AFTER keybinding.conf (last wins)
# Only DMS-specific overrides and mousebinds live here

bind=SUPER+SHIFT,Escape,spawn,dms ipc call processlist focusOrToggle
bind=Super,F,toggleemaximumscreen
bind=Super+CTRL,F,togglefloating

# --- Window manipulation (mousebinds) ---
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# --- Layout ---
bind=SUPER+CTRL,l,switch_layout
