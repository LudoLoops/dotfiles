# Mango Key Bindings (Adapted from Hyprland)
# Modifiers: super, ctrl, alt, shift, none

# --- General ---
bind=SUPER,r,reload_config
bind=SUPER,q,killclient,
bind=ALT,F4,killclient,
bind=SUPER,Delete,quit,
bind=SUPER,w,togglefloating,
bind=SUPER,f,togglefullscreen,
bind=ALT,Tab,focusstack,next

# --- Launchers ---
bindr=SUPER,t,spawn,kitty
bind=SUPER,b,spawn,/usr/bin/zen-browser
bind=SUPER,e,spawn,dolphin
bind=SUPER,c,spawn,code
bind=SUPER,o,spawn,obsidian

# --- Focus Management (Arrows & Vim keys) ---
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# --- Window Movement (Swap) ---
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# --- Window Resizing ---
bind=SUPER+SHIFT+CONTROL,Left,resizewin,-30,+0
bind=SUPER+SHIFT+CONTROL,Right,resizewin,+30,+0
bind=SUPER+SHIFT+CONTROL,Up,resizewin,+0,-30
bind=SUPER+SHIFT+CONTROL,Down,resizewin,+0,+30

# --- Workspaces (Tags in Mango) ---
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Move window to workspace
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Move window to workspace silently
bind=SUPER+ALT,1,tagsilent,1
bind=SUPER+ALT,2,tagsilent,2
bind=SUPER+ALT,3,tagsilent,3
bind=SUPER+ALT,4,tagsilent,4
bind=SUPER+ALT,5,tagsilent,5
bind=SUPER+ALT,6,tagsilent,6
bind=SUPER+ALT,7,tagsilent,7
bind=SUPER+ALT,8,tagsilent,8
bind=SUPER+ALT,9,tagsilent,9

# Special workspace (Scratchpad)
bind=SUPER,s,toggle_scratchpad,
bind=SUPER+SHIFT,s,tag,special
bind=SUPER+ALT,s,tagsilent,special

# --- Hardware Controls ---
bindrXF86AudioPlay,spawn,playerctl play-pause

# --- Utilities ---
bind=SUPER,p,spawn,hyprpicker -an

# --- Mouse Bindings ---
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
