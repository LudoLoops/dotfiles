# setlayout is a command, not a config keyword (set via tagrule instead)
sloppyfocus=0
smartgaps=1
drag_tile_to_tile=1
drag_corner=4

# Scroller layout settings
scroller_structs=1
scroller_proportion_preset=0.5,0.8,1.0
scroller_default_proportion=0.5

# Force scroller on tag 1 at startup
tagrule=id:1,layout_name:scroller

# Tag 5 — gaming, floating windows
tagrule=id:5,open_as_floating:1

# Overview: toggle mode (press to open, press again to close)
ov_tab_mode=0
