# ~/.config/tmux/themes/catppucin_hyprland.conf

# 1. Global Flavor
set -g @catppuccin_flavor "mocha"

# 2. Window (Tabs) Styling - Rounded Pills
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"

# Correction for Fish: If the window name is just "fish", show the pane title (useful for SSH/Kimsufi)
set -g @catppuccin_window_text "#{?#{!=:#W,fish},#W,#T}"
set -g @catppuccin_window_current_text "#{?#{!=:#W,fish},#W,#T}"

# Colors for the Pills
set -g @catppuccin_window_default_background "#{@thm_blue}"
set -g @catppuccin_window_default_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_background "#{@thm_peach}"
set -g @catppuccin_window_current_color "#{@thm_bg}"

# 3. Status Bar Components (Right side)
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Module colors
set -g @catppuccin_session_color "#{E:@thm_green}"
set -g @catppuccin_date_time_text " %I:%M %p"

# Prefix indicator (shows when Ctrl+b is pressed)
set -g @prefix_highlight_fg "#{@thm_bg}"
set -g @prefix_highlight_bg "#{@thm_red}"
set -g @prefix_highlight_prefix_prompt "  "
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=#{@thm_bg},bg=#{@thm_yellow}"

# 4. Final Layout
set -g status-left "#{prefix_highlight}"
set -g status-right "#{E:@catppuccin_status_session}"
