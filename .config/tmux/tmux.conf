# ==============================================================================
# GENERAL CONFIGURATION & TERMINAL
# ==============================================================================

# Make Tmux aware of Kitty capabilities (True Color & Italics)
set -g default-terminal "xterm-kitty"
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-overrides ',xterm-kitty:Ms=\E]52;%p1%s;%p2%s\007'

# Set Fish as the default shell
set-option -g default-shell /usr/bin/fish

# Interface and Mouse
set -g mouse on
set-option -g status-position top
set -s set-clipboard on

# Window indexing (Start at 1 instead of 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Automatic window renaming based on current directory
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# ==============================================================================
# KEYBINDINGS
# ==============================================================================

# Reload config with Prefix + r
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Pane navigation (Vim Style) - With Prefix
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane navigation WITHOUT Prefix (Alt+h/j/k/l)
# NOTE: Now handled by tmux.nvim for resize (Alt+h/j/k/l)
# These simple navigation bindings are replaced by smarter tmux.nvim navigation (Ctrl+h/j/k/l)

# ==============================================================================
# TMUX.NVIM - Seamless navigation and resize between nvim and tmux
# ==============================================================================

# Detect if nvim/vim is running in the current pane (tmux.nvim regex)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"

# Navigation: Ctrl+h/j/k/l - send to nvim if active, else navigate tmux
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

# Resize: Alt+h/j/k/l - send to nvim if active, else resize tmux pane
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 1'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 1'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 1'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 1'

# Copy mode navigation
bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'
bind-key -T copy-mode-vi 'M-h' resize-pane -L 1
bind-key -T copy-mode-vi 'M-j' resize-pane -D 1
bind-key -T copy-mode-vi 'M-k' resize-pane -U 1
bind-key -T copy-mode-vi 'M-l' resize-pane -R 1

# Split panes (Preserve current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane management
bind b break-pane -d -n "broken_pane"
bind m command-prompt -p "Move pane to:" "move-pane -t '%%'"

# --- Direct shortcuts (No Prefix required) ---

# Windows (Tabs): Ctrl+Shift+t / Ctrl+Shift+w
bind-key -n C-S-t run-shell '~/.config/tmux/scripts/new-window-cwd.sh'
bind-key -n C-S-w confirm-before -p "Kill window #W? (y/n)" kill-window

# New session: Ctrl+Shift+n
bind-key -n C-S-n new-session

# Direct window access: Alt+1 to Alt+9
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Tab Navigation: Ctrl+Tab / Ctrl+Shift+Tab
bind-key -n C-Tab next-window
bind-key -n C-S-Tab previous-window

# Sessions: Alt+] / Alt+[ / Alt+s
bind-key -n M-] switch-client -n
bind-key -n M-[ switch-client -p
bind-key -n M-s choose-tree -sZ

# ==============================================================================
# PLUGIN MANAGEMENT (TPM)
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'catppuccin/tmux'

# Plugin-specific settings
set -g @continuum-restore 'on'

# Import the theme file
source-file ~/.config/tmux/themes/catppucin_hyprland.conf
# ==============================================================================
# SESSIONX PLUGIN OPTIONS
# ==============================================================================
# Bind SessionX to Prefix + o
set -g @sessionx-bind 'e'
# Use eza (replacement for exa) to show a nice tree preview of your projects
set -g @sessionx-ls-command 'eza --tree --level=2 --icons --git'

# Enable Zoxide mode to jump to frequently used directories instantly
set -g @sessionx-zoxide-mode 'on'

# If you use Yazi as your file manager, you can bind it to a key within SessionX
# (Note: SessionX uses its own internal logic, but keeping your preference here)
set -g @sessionx-custom-path-display 'on'
# ==============================================================================
#
# FINAL INITIALIZATION
# ==============================================================================

# This line must ALWAYS be at the bottom of the file
run '~/.config/tmux/plugins/tpm/tpm'
